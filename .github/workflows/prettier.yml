name: Prettier

on:
  pull_request:
  push:
    branches:
      - master
      - main

permissions:
  contents: read

jobs:
  prettier:
    name: Prettier
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Check formatting
        run: >
          npx --yes prettier@3.3.3 --check ".github/**/*.{yml,yaml}" "package.json"
