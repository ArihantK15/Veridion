services:
  app-server:
    build:
      context: ..
      dockerfile: github-app/Dockerfile.app-server
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      - GITHUB_APP_PRIVATE_KEY_PATH=/run/secrets/github-app-key.pem
    volumes:
      - ./app-private-key.pem:/run/secrets/github-app-key.pem:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "127.0.0.1:8000:8000"
    cpus: "1.0"
    mem_limit: 768m

  scan-worker:
    build:
      context: ..
      dockerfile: github-app/Dockerfile.scan-worker
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      - GITHUB_APP_PRIVATE_KEY_PATH=/run/secrets/github-app-key.pem
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - ./app-private-key.pem:/run/secrets/github-app-key.pem:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      ollama:
        condition: service_started
    cpus: "1.0"
    mem_limit: 1g

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      - POSTGRES_DB=aletheore_app
      - POSTGRES_USER=aletheore
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - aletheore_postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aletheore -d aletheore_app"]
      interval: 2s
      timeout: 3s
      retries: 20

  scheduler:
    build:
      context: ..
      dockerfile: github-app/Dockerfile.scan-worker
    restart: unless-stopped
    command: ["python", "-m", "scan_worker.scheduler"]
    env_file:
      - path: .env
        required: false
    depends_on:
      redis:
        condition: service_started

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - aletheore_ollama_data:/root/.ollama
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve &
        sleep 3
        ollama pull nomic-embed-text
        wait
    cpus: "1.0"
    mem_limit: 1g

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - aletheore_caddy_data:/data
      - aletheore_caddy_config:/config
    depends_on:
      - app-server

volumes:
  aletheore_postgres_data:
  aletheore_ollama_data:
  aletheore_caddy_data:
  aletheore_caddy_config:
