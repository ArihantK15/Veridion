name: "Aletheore"
description: "Posts an evidence-grounded PR diff: secrets, vulnerabilities, layer violations, architecture deltas."
author: "Aletheore"

branding:
  icon: "eye"
  color: "gray-dark"

inputs:
  base-ref:
    description: "Git ref/sha to treat as the base"
    required: false
    default: ${{ github.event.pull_request.base.sha }}
  head-ref:
    description: "Git ref/sha to treat as the head"
    required: false
    default: ${{ github.event.pull_request.head.sha }}
  fail-on-new-secrets:
    description: "Exit non-zero if a new real (non-placeholder) secret is found"
    required: false
    default: "false"
  fail-on-new-vulnerabilities:
    description: "Exit non-zero if a new dependency vulnerability is found"
    required: false
    default: "false"
  fail-on-new-layer-violations:
    description: "Exit non-zero if a new layer-convention violation is found"
    required: false
    default: "false"
  full:
    description: "Show the full raw diff instead of the curated summary"
    required: false
    default: "false"
  post-pr-comment:
    description: "Post the diff as a PR comment (requires pull-requests: write permission)"
    required: false
    default: "true"

outputs:
  diff-json:
    description: "The JSON diff output"
    value: ${{ steps.diff.outputs.diff-json }}

runs:
  using: "composite"
  steps:
    - name: Checkout base
      uses: actions/checkout@v4
      with:
        ref: ${{ inputs.base-ref }}
        path: aletheore-base

    - name: Checkout head
      uses: actions/checkout@v4
      with:
        ref: ${{ inputs.head-ref }}
        path: aletheore-head

    - name: Set up Python
      uses: actions/setup-python@v7
      with:
        python-version: "3.12"

    - name: Install Aletheore
      shell: bash
      run: pip install "${{ github.action_path }}/prototype"

    - name: Scan base
      shell: bash
      run: aletheore scan aletheore-base

    - name: Scan head
      shell: bash
      run: aletheore scan aletheore-head

    - name: Diff
      id: diff
      shell: bash
      run: |
        ARGS=""
        if [ "${{ inputs.full }}" = "true" ]; then
          ARGS="$ARGS --full"
        fi
        if [ "${{ inputs.fail-on-new-secrets }}" = "true" ]; then
          ARGS="$ARGS --fail-on-new-secrets"
        fi
        if [ "${{ inputs.fail-on-new-vulnerabilities }}" = "true" ]; then
          ARGS="$ARGS --fail-on-new-vulnerabilities"
        fi
        if [ "${{ inputs.fail-on-new-layer-violations }}" = "true" ]; then
          ARGS="$ARGS --fail-on-new-layer-violations"
        fi

        set +e
        aletheore diff aletheore-base/.aletheore/air.json aletheore-head/.aletheore/air.json $ARGS > diff-output.json
        DIFF_EXIT_CODE=$?
        set -e

        {
          echo "diff-json<<ALETHEORE_EOF"
          cat diff-output.json
          echo "ALETHEORE_EOF"
        } >> "$GITHUB_OUTPUT"

        cat diff-output.json
        exit $DIFF_EXIT_CODE

    - name: Annotate new secrets
      if: always()
      shell: bash
      run: |
        if [ ! -f diff-output.json ]; then
          echo "diff-output.json not found (an earlier step failed) - skipping annotations"
          exit 0
        fi

        # Only current-tree secrets carry both a file path and a real line number - history
        # secrets point at an old commit (no line in the current tree to point to), and
        # vulnerabilities/layer violations are package- or file-level, not tied to any
        # specific line at all. Faking a line number for those would misattribute the
        # annotation, so only new secrets get inline annotations here; everything else stays
        # in the PR comment above, where a file-level or package-level fact belongs.
        python3 - <<'PYEOF'
        import json

        with open("diff-output.json") as f:
            diff = json.load(f)

        for finding in diff.get("secrets", {}).get("new", []):
            if finding.get("likely_placeholder") or finding.get("accepted"):
                continue
            path = finding.get("path", "")
            line = finding.get("line", 1)
            pattern = finding.get("pattern", "secret")
            message = f"New secret detected ({pattern}). Rotate it and remove it from source."
            message = message.replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A")
            print(f"::error file={path},line={line}::{message}")
        PYEOF

    - name: Format diff summary
      if: always()
      shell: bash
      run: |
        if [ ! -f diff-output.json ]; then
          echo "diff-output.json not found (an earlier step failed) - skipping summary"
          exit 0
        fi

        python3 - <<'PYEOF'
        import json
        import os

        from aletheore.pr_comment import format_diff_comment

        with open("diff-output.json") as f:
            diff = json.load(f)

        text = format_diff_comment(diff)

        with open("aletheore-comment.md", "w") as f:
            f.write(text)

        # Visible for every run, not just pull_request events - a plain push has no PR to
        # comment on, but the run's own Summary tab is always there.
        summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
        if summary_path:
            with open(summary_path, "a") as f:
                f.write(text + "\n")
        PYEOF

    - name: Post PR comment
      if: always() && inputs.post-pr-comment == 'true' && github.event_name == 'pull_request'
      continue-on-error: true
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          if (!fs.existsSync('aletheore-comment.md')) return;
          const body = fs.readFileSync('aletheore-comment.md', 'utf8');
          const marker = '<!-- aletheore-diff -->';

          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.payload.pull_request.number,
          });
          const existing = comments.find((c) => c.body && c.body.includes(marker));

          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });
          }
