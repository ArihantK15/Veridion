name: GitHub App Tests

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test
          POSTGRES_DB: aletheore_test
        ports:
          - 55433:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d aletheore_test" --health-interval 2s
          --health-timeout 5s --health-retries 15
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping" --health-interval 2s --health-timeout 5s --health-retries 15

    env:
      TEST_DATABASE_URL: postgresql://postgres:test@localhost:55433/aletheore_test
      DATABASE_URL: postgresql://postgres:test@localhost:55433/aletheore_test
      TEST_REDIS_URL: redis://localhost:6379/0
      GITHUB_APP_ID: "12345"
      GITHUB_APP_PRIVATE_KEY: test-private-key
      GITHUB_WEBHOOK_SECRET: test-webhook-secret
      GITHUB_CLIENT_ID: test-client-id
      GITHUB_CLIENT_SECRET: test-client-secret
      SESSION_SECRET: test-session-secret
      PUBLIC_BASE_URL: http://test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install prototype package
        working-directory: prototype
        run: pip install -e .

      - name: Install github-app dependencies
        working-directory: github-app
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: github-app
        run: >
          python -m pytest --cov=app_server --cov=scan_worker --cov-report=term-missing
          --cov-report=xml --cov-fail-under=85

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-github-app
          path: github-app/coverage.xml
          retention-days: 14
