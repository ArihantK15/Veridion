name: Container Security

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read
  security-events: write

jobs:
  image-scan:
    name: Image scan (${{ matrix.image }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: app-server
            dockerfile: github-app/Dockerfile.app-server
            tag: aletheore-app-server:ci
          - image: scan-worker
            dockerfile: github-app/Dockerfile.scan-worker
            tag: aletheore-scan-worker:ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -f "${{ matrix.dockerfile }}" -t "${{ matrix.tag }}" .

      - name: Scan image report
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ matrix.tag }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"

      - name: Enforce image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ matrix.tag }}
          format: sarif
          output: trivy-${{ matrix.image }}.sarif
          severity: HIGH,CRITICAL
          limit-severities-for-sarif: true
          ignore-unfixed: true
          exit-code: "1"

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.image }}.sarif

  sbom:
    name: SBOM (${{ matrix.image }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: app-server
            dockerfile: github-app/Dockerfile.app-server
            tag: aletheore-app-server:ci
          - image: scan-worker
            dockerfile: github-app/Dockerfile.scan-worker
            tag: aletheore-scan-worker:ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -f "${{ matrix.dockerfile }}" -t "${{ matrix.tag }}" .

      - name: Generate SBOM
        uses: anchore/sbom-action@v0.24.0
        with:
          image: ${{ matrix.tag }}
          format: spdx-json
          output-file: sbom-${{ matrix.image }}.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.image }}
          path: sbom-${{ matrix.image }}.spdx.json
          retention-days: 30
