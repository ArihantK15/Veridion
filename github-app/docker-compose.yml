services:
  app-server:
    build:
      context: ..
      dockerfile: github-app/Dockerfile.app-server
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      - GITHUB_APP_PRIVATE_KEY_PATH=/run/secrets/github-app-key.pem
    volumes:
      - ./app-private-key.pem:/run/secrets/github-app-key.pem:ro
    labels:
      ofelia.enabled: "true"
      ofelia.job-exec.health-sweep.schedule: "@every 3m"
      ofelia.job-exec.health-sweep.command: >
        python -c "from redis import Redis; from rq import Queue;
        Queue('scans', connection=Redis.from_url('redis://redis:6379/0')).enqueue('scan_worker.jobs.run_health_check_sweep_job')"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "127.0.0.1:8000:8000"

  scan-worker:
    build:
      context: ..
      dockerfile: github-app/Dockerfile.scan-worker
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      - GITHUB_APP_PRIVATE_KEY_PATH=/run/secrets/github-app-key.pem
    volumes:
      - ./app-private-key.pem:/run/secrets/github-app-key.pem:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      - POSTGRES_DB=aletheore_app
      - POSTGRES_USER=aletheore
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - aletheore_postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aletheore -d aletheore_app"]
      interval: 2s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - aletheore_caddy_data:/data
      - aletheore_caddy_config:/config
    depends_on:
      - app-server

  ofelia:
    image: mcuadros/ofelia:latest
    restart: unless-stopped
    depends_on:
      - scan-worker
    command: daemon --docker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

volumes:
  aletheore_postgres_data:
  aletheore_caddy_data:
  aletheore_caddy_config:
