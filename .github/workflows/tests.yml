name: Tests

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        working-directory: prototype
        run: pip install -e ".[dev]"

      - name: Run tests
        working-directory: prototype
        run: >
          pytest --cov=aletheore --cov-report=term-missing --cov-report=xml --cov-fail-under=85

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-prototype-py${{ matrix.python-version }}
          path: prototype/coverage.xml
          retention-days: 14
