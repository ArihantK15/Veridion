name: Tests

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        working-directory: prototype
        run: pip install -e ".[dev]"

      - name: Run tests
        working-directory: prototype
        run: pytest
